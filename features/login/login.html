<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio de Sesion</title>
    <link rel="stylesheet" href="/features/login/login.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="form-container">
      <div class="brand">
        <div class="brand-icon">
          <img src="/assets/img/logo.jpg" alt="Logo Sorbeteria Herrera" />
        </div>
        <h2 class="brand-name">Sorbetería Herrera</h2>
        <p class="brand-slogan">EL SABOR DE LO NATURAL</p>
      </div>

      <h1>Bienvenido</h1>
      <p>Por favor ingresa tus credenciales</p>

      <form method="post">
        <div class="field">
          <label class="user-name" for="user-name">Usuarios</label>
          <input id="user-name" type="text" required />
        </div>
        <div class="field">
          <div class="field-header">
            <label for="password">Contraseña</label>
            <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
          </div>
          <div class="input-wrapper">
            <input id="password" type="password" required />
            <button
              type="button"
              class="toggle-password"
              onclick="togglePassword()"
            >
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>
        <input type="submit" value="Continuar al sistema" />
      </form>
      <footer>
        <p>&copy; 2026 Sorbetería Herrera. Todos los derechos reservados.</p>
      </footer>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/features/login/login.js"></script>
  </body>
</html>
