<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Historial de Pedidos - HerreraSystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="/shared/css/global.css" />
    <link rel="stylesheet" href="/shared/components/sidebar/sidebar.css" />
    <link rel="stylesheet" href="/shared/components/topbar/topbar.css" />
    <link rel="stylesheet" href="/modules/order/order.css" />
    <link rel="stylesheet" href="order-details.css" />
  </head>
  <body>
    <div id="layout-placeholder"></div>
    <div id="topbar-placeholder"></div>

    <main class="main-content">
      <div class="page-header">
        <div class="header-info">
          <h1 class="page-title">Historial de Pedidos</h1>
          <p class="page-subtitle">
            Gestiona y rastrea el estado de tus entregas
          </p>
        </div>

        <a href="order.html" class="btn-primary-modern">
          <i data-lucide="plus-circle"></i>
          <span>Nuevo Pedido</span>
        </a>
      </div>

      <div class="toolbar-container">
        <div class="search-wrapper">
          <i data-lucide="search" class="search-icon"></i>
          <input
            type="text"
            class="search-input"
            placeholder="Buscar por cliente, ID o fecha..."
          />
        </div>

        <button class="btn-filter-modern">
          <i data-lucide="sliders-horizontal"></i>
          <span>Filtrar</span>
        </button>
      </div>

      <div class="orders-grid">
        <div class="order-card border-pending">
          <div class="order-header">
            <span class="order-id">#PED-1024</span>
            <span class="badge badge-pending">Pendiente</span>
          </div>
          <div class="order-body">
            <h3 class="client-name">Distribuidora "El Maná"</h3>
            <div class="order-info">
              <p><i data-lucide="calendar"></i> 08 Mayo, 2024</p>
              <p><i data-lucide="map-pin"></i> Jinotepe, Carazo</p>
            </div>
            <div class="order-total">
              <span>Total:</span>
              <strong>1,250.00 C$</strong>
            </div>
          </div>
          <div class="order-footer">
            <a href="#" onclick="verDetalles('1024')" class="btn-view-detail">
              Ver Detalles <i data-lucide="chevron-right"></i>
            </a>
          </div>
        </div>

        <div class="order-card border-completed">
          <div class="order-header">
            <span class="order-id">#PED-1023</span>
            <span class="badge badge-completed">Entregado</span>
          </div>
          <div class="order-body">
            <h3 class="client-name">Supermercado Central</h3>
            <div class="order-info">
              <p><i data-lucide="calendar"></i> 07 Mayo, 2024</p>
              <p><i data-lucide="map-pin"></i> Managua</p>
            </div>
            <div class="order-total">
              <span>Total:</span>
              <strong>3,400.00 C$</strong>
            </div>
          </div>
          <div class="order-footer">
            <a href="#" onclick="verDetalles('1023')" class="btn-view-detail">
              Ver Detalles <i data-lucide="chevron-right"></i>
            </a>
          </div>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      // Inicializar iconos de Lucide
      lucide.createIcons();
    </script>
    <script src="/shared/components/sidebar/sidebar.js"></script>
    <script src="/shared/components/topbar/topbar.js"></script>
  </body>
</html>
