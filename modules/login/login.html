<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio de Sesión — Sorbetería Herrera</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="../styles/global.css" />
    <link rel="stylesheet" href="../../styles/variables.css" />
    <link rel="stylesheet" href="../login/login.css" />
  </head>
  <body>
    <main class="login-page">
      <section class="brand-panel">
        <div class="glass-circle circle-1"></div>
        <div class="glass-circle circle-2"></div>
        <div class="glass-circle circle-3"></div>

        <div class="brand-content">
          <span class="brand-badge">Sistema de Gestión</span>

          <div class="brand-logo-container">
            <img
              src="/assets/img/logo.jpg"
              onerror="
                this.src =
                  'https://ui-avatars.com/api/?name=SH&background=fff&color=00C296&size=150'
              "
              alt="Logo Sorbetería Herrera"
            />
          </div>

          <h1>Sorbetería Herrera</h1>
          <p>
            Accede al panel de control para administrar ventas, inventario,
            pedidos y más. Hecho en familia, gestionado de forma inteligente.
          </p>
        </div>
      </section>

      <section class="form-panel">
        <div class="form-wrapper">
          <div class="form-header">
            <h2>Iniciar Sesión</h2>
            <p>Ingresa tus credenciales para continuar.</p>
          </div>

          <form id="login-form" method="post">
            <div class="field">
              <label for="username">Usuario</label>
              <div class="input-wrapper">
                <i data-lucide="user" class="input-icon"></i>
                <input
                  id="username"
                  name="username"
                  type="text"
                  autocomplete="nickname"
                  placeholder="Ej: admin"
                  required
                />
              </div>
            </div>

            <div class="field">
              <label for="password">Contraseña</label>
              <div class="input-wrapper">
                <i data-lucide="lock" class="input-icon"></i>
                <input
                  id="password"
                  name="password"
                  type="password"
                  autocomplete="current-password"
                  placeholder="••••••••"
                  required
                />
                <button
                  type="button"
                  class="toggle-password"
                  aria-label="Mostrar contraseña"
                >
                  <i data-lucide="eye"></i>
                </button>
              </div>
            </div>

            <button type="submit" class="btn-submit">
              <span>Ingresar al sistema</span>
              <i data-lucide="arrow-right"></i>
            </button>
          </form>

          <footer class="login-footer">
            <p>
              &copy; 2026 Sorbetería Herrera.<br />Todos los derechos
              reservados.
            </p>
          </footer>
        </div>
      </section>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/modules/login/login.js"></script>
  </body>
</html>
