<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventario | Sistema de Gestion</title>

    <link rel="stylesheet" href="../../styles/variables.css" />
    <link rel="stylesheet" href="../../styles/reset.css" />
    <link rel="stylesheet" href="../../styles/global.css" />
    <link rel="stylesheet" href="../../styles/layout.css" />

    <link rel="stylesheet" href="../shared/components/sidebar/sidebar.css" />
    <link rel="stylesheet" href="../shared/components/topbar/topbar.css" />
    <link rel="stylesheet" href="../shared/components/filter-bar/filter-bar.css" />
    <link rel="stylesheet" href="../shared/components/stat-card/stat-card.css" />
    <link rel="stylesheet" href="../shared/components/buttons/buttons.css" />

    <link rel="stylesheet" href="./productInventory.css" />
    <link rel="stylesheet" href="./productInventoryDrawer.css" />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  </head>

  <body>
    <div id="layout-placeholder"></div>
    <script src="../shared/components/sidebar/sidebar.js"></script>

    <div id="topbar-placeholder"></div>
    <script src="../shared/components/topbar/topbar.js"></script>

    <div id="inventory-drawer-placeholder"></div>

    <main class="main-content">
      <div class="page-header animate-in">
        <div class="page-header-left">
          <h1>Inventario</h1>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-outline" type="button">
            <i data-lucide="download" style="width: 16px; height: 16px"></i>
            <span class="btn-label">Exportar</span>
          </button>
          <button class="btn btn-primary" type="button" onclick="window.location.href='/modules/restock/restock.html'">
            <i data-lucide="plus" style="width: 18px; height: 18px"></i>
            <span class="btn-label">Reabastecer</span>
          </button>
        </div>
      </div>

      <div class="stats-row animate-in delay-1">
        <div class="stat-card stat-card-mint">
          <div class="stat-card-decoration"></div>
          <div class="stat-card-icon">
            <i data-lucide="package" style="width: 20px; height: 20px"></i>
          </div>
          <div class="stat-card-label">Total Productos</div>
          <div class="stat-card-value" id="stat-total-products">-</div>
        </div>

        <div class="stat-card stat-card-yellow">
          <div class="stat-card-decoration"></div>
          <div class="stat-card-icon">
            <i data-lucide="alert-triangle" style="width: 20px; height: 20px"></i>
          </div>
          <div class="stat-card-label">Stock Bajo</div>
          <div class="stat-card-value" id="stat-low-stock">-</div>
        </div>

        <div class="stat-card stat-card-coral">
          <div class="stat-card-decoration"></div>
          <div class="stat-card-icon">
            <i data-lucide="trending-up" style="width: 20px; height: 20px"></i>
          </div>
          <div class="stat-card-label">Mas Vendido</div>
          <div class="stat-card-value" id="stat-best-flavor">-</div>
        </div>

        <div class="stat-card stat-card-purple">
          <div class="stat-card-decoration"></div>
          <div class="stat-card-icon">
            <i data-lucide="dollar-sign" style="width: 20px; height: 20px"></i>
          </div>
          <div class="stat-card-label">Valor Inventario</div>
          <div class="stat-card-value" id="stat-inventory-value">-</div>
        </div>
      </div>

      <div class="filter-bar animate-in delay-2">
        <div class="filter-field filter-search">
          <label class="filter-label">Buscar</label>
          <div class="filter-input-wrapper">
            <input type="text" class="filter-input" placeholder="Buscar por producto..." id="searchInput" />
            <i data-lucide="search" class="filter-icon"></i>
          </div>
        </div>
        <div class="filter-divider"></div>
        <div class="filter-field">
          <label class="filter-label">Linea</label>
          <select class="filter-select" id="filterLine">
            <option value="">Todas las lineas</option>
          </select>
        </div>
        <div class="filter-field">
          <label class="filter-label">Sabor</label>
          <select class="filter-select" id="filterFlavor">
            <option value="">Todos los sabores</option>
          </select>
        </div>
        <div class="filter-field">
          <label class="filter-label">Presentacion</label>
          <select class="filter-select" id="filterPresentation" disabled>
            <option value="">Todas</option>
          </select>
        </div>
        <div class="filter-actions">
          <button type="button" class="filter-btn filter-btn--clear" onclick="clearFilters()">
            <i data-lucide="x"></i> Limpiar
          </button>
          <button type="button" class="filter-btn filter-btn--primary" onclick="applyFilters()">
            <i data-lucide="search"></i> Filtrar
          </button>
        </div>
      </div>

      <div class="content-grid animate-in delay-3">
        <div class="results-card">
          <div class="results-header">
            <h2>
              <span>Resultados</span>
              <span class="count-badge" id="resultCount">-</span>
            </h2>
            <div class="results-actions">
              <button class="btn btn-outline" type="button" style="padding: 8px 12px">
                <i data-lucide="arrow-down-up" style="width: 14px; height: 14px"></i>
                Ordenar
              </button>
            </div>
          </div>

          <div class="table-wrapper">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Producto</th>
                  <th style="text-align: center">Stock Mostrador</th>
                  <th style="text-align: center">Stock Bodega</th>
                  <th style="text-align: center">Stock Reservado</th>
                  <th style="text-align: center">Stock Total</th>
                  <th style="text-align: center"></th>
                </tr>
              </thead>
              <tbody id="inventoryTableBody">
                <tr>
                  <td colspan="6" class="table-loading">Cargando inventario...</td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="table-footer">
            <div class="table-footer-info">
              Mostrando <strong id="showingFrom">0-0</strong> de
              <strong id="showingTotal">0</strong> productos
            </div>
            <div class="pagination"></div>
          </div>
        </div>
      </div>
    </main>

    <script src="./models/inventory-model.js"></script>
    <script src="./services/inventory.service.js"></script>
    <script src="./components/inventory-drawer/inventory-drawer.js"></script>
    <script src="./pages/productInventory.js"></script>
  </body>
</html>
