<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clientes — Sistema Herrera</title>

    <!-- Estilos globales -->
    <link rel="stylesheet" href="../../../styles/variables.css" />
    <link rel="stylesheet" href="../../../styles/reset.css" />
    <link rel="stylesheet" href="../../../styles/global.css" />
    <link rel="stylesheet" href="../../../styles/layout.css" />

    <!-- Estilos de componentes shared -->
    <link rel="stylesheet" href="../../shared/components/sidebar/sidebar.css" />
    <link rel="stylesheet" href="../../shared/components/topbar/topbar.css" />
    <link rel="stylesheet" href="../../shared/components/filter-bar/filter-bar.css" />
    <link rel="stylesheet" href="../../shared/components/stat-card/stat-card.css" />
    <link rel="stylesheet" href="../../shared/components/buttons/buttons.css" />

    <!-- Estilos del módulo customers -->
    <link rel="stylesheet" href="../../customers/components/customer-form-modal/customer-form-modal.css" />
    <link rel="stylesheet" href="../../customers/components/customer-detail-modal/customer-detail-modal.css" />
    <link rel="stylesheet" href="./customer-dashboard.css" />

    <!-- Íconos -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  </head>
  <body>

    <!-- Layout -->
    <div id="layout-placeholder"></div>
    <script src="../../shared/components/sidebar/sidebar.js"></script>

    <div id="topbar-placeholder"></div>
    <script src="../../shared/components/topbar/topbar.js"></script>

    <!-- Placeholders de modales (inyectados por JS) -->
    <div id="customer-form-modal-placeholder"></div>
    <div id="customer-detail-modal-placeholder"></div>

    <main class="main-content">

      <!-- ── Encabezado ──────────────────────────────────────── -->
      <div class="page-header animate-in">
        <div class="page-header-left">
          <h1>Clientes</h1>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-outline">
            <i data-lucide="download" style="width:16px;height:16px"></i>
            <span class="btn-label">Exportar</span>
          </button>
          <button class="btn btn-primary">
            <i data-lucide="plus" style="width:18px;height:18px"></i>
            <span class="btn-label">Nuevo cliente</span>
          </button>
        </div>
      </div>

      <!-- ── Stat cards ──────────────────────────────────────── -->
      <div class="stats-row animate-in delay-1">
        <div class="stat-card stat-card-mint">
          <div class="stat-card-decoration"></div>
          <div class="stat-card-icon"><i data-lucide="users"></i></div>
          <div class="stat-card-label">Clientes Activos</div>
          <div class="stat-card-value" id="stat-active">—</div>
        </div>

        <div class="stat-card stat-card-yellow">
          <div class="stat-card-decoration"></div>
          <div class="stat-card-icon"><i data-lucide="user-check"></i></div>
          <div class="stat-card-label">Clientes Inactivos</div>
          <div class="stat-card-value" id="stat-inactive">—</div>
        </div>

        <div class="stat-card stat-card-coral">
          <div class="stat-card-decoration"></div>
          <div class="stat-card-icon"><i data-lucide="map-pin"></i></div>
          <div class="stat-card-label">Municipios</div>
          <div class="stat-card-value" id="stat-municipalities">—</div>
        </div>

        <div class="stat-card stat-card-purple">
          <div class="stat-card-decoration"></div>
          <div class="stat-card-icon"><i data-lucide="store"></i></div>
          <div class="stat-card-label">Puntos de Venta</div>
          <div class="stat-card-value" id="stat-pos">—</div>
        </div>
      </div>

      <!-- ── Barra de filtros ────────────────────────────────── -->
      <div class="filter-bar animate-in delay-2">
        <div class="filter-field filter-search">
          <label class="filter-label">Buscar</label>
          <div class="filter-input-wrapper">
            <input
              type="text"
              class="filter-input"
              placeholder="Buscar clientes..."
              id="searchInput"
            />
            <i data-lucide="search" class="filter-icon"></i>
          </div>
        </div>

        <div class="filter-divider"></div>

        <div class="filter-field">
          <label class="filter-label">Departamento</label>
          <select class="filter-select" id="deptFilter">
            <option value="">Todos</option>
            <option value="managua">Managua</option>
            <option value="carazo">Carazo</option>
            <option value="esteli">Estelí</option>
            <option value="matagalpa">Matagalpa</option>
            <option value="granada">Granada</option>
            <option value="leon">León</option>
            <option value="chinandega">Chinandega</option>
          </select>
        </div>

        <div class="filter-field">
          <label class="filter-label">Municipio</label>
          <select class="filter-select" id="municipalityFilter">
            <option value="">Todos</option>
            <option value="jinotepe">Jinotepe</option>
            <option value="san-marcos">San Marcos</option>
            <option value="tipitapa">Tipitapa</option>
            <option value="ticuantepe">Ticuantepe</option>
          </select>
        </div>

        <div class="filter-actions">
          <button type="button" class="filter-btn filter-btn--clear" onclick="clearFilters()">
            <i data-lucide="x"></i> Limpiar
          </button>
          <button type="button" class="filter-btn filter-btn--primary" onclick="applyFilters()">
            <i data-lucide="search"></i> Buscar
          </button>
        </div>
      </div>

      <!-- ── Tabla ───────────────────────────────────────────── -->
      <div class="table-card animate-in delay-3">
        <div class="table-card-header">
          <h2>
            <span>Lista de Clientes</span>
            <span class="count-badge">—</span>
          </h2>
          <div class="table-actions">
            <button class="btn btn-outline">
              <i data-lucide="arrow-down-up"></i> Ordenar
            </button>
          </div>
        </div>

        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Teléfono</th>
                <th>Municipio</th>
                <th>Punto de Venta</th>
                <th>Detalles</th>
              </tr>
            </thead>
            <tbody id="clientsTableBody">
              <tr>
                <td colspan="5" class="table-loading">Cargando clientes…</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="table-footer">
          <div class="table-footer-info">
            Cargando…
          </div>
          <div class="pagination">
            <!-- Generado dinámicamente por el JS -->
          </div>
        </div>
      </div>

    </main>

    <!-- ── Scripts del módulo (orden importante) ──────────────── -->

    <!-- 1. Modelo -->
    <script src="../../customers/models/customer-model.js"></script>

    <!-- 2. Servicio (API layer) -->
    <script src="../../customers/services/customer-service.js"></script>
    <script src="../../customers/services/location.service.js"></script>

    <!-- 3. Componentes de modales -->
    <script src="../../customers/components/customer-form-modal/customer-form-modal.js"></script>
    <script src="../../customers/components/customer-detail-modal/customer-detail-modal.js"></script>

    <!-- 4. Orquestador del dashboard -->
    <script src="./customer-dashboard.js"></script>

  </body>
</html>
