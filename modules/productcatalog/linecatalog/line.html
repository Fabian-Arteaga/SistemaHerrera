<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productos — Sorbetería Herrera</title>

    <link rel="stylesheet" href="/shared/css/global.css" />
    <link rel="stylesheet" href="/shared/components/sidebar/sidebar.css" />
    <link rel="stylesheet" href="/shared/components/topbar/topbar.css" />
    <link rel="stylesheet" href="/shared/css/cards.css" />
    <link rel="stylesheet" href="/shared/css/filterBar.css" />
    <link rel="stylesheet" href="line.css" />

    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <div id="layout-placeholder"></div>
    <script src="/shared/components/sidebar/sidebar.js"></script>

    <div id="topbar-placeholder"></div>
    <script src="/shared/components/topbar/topbar.js"></script>

  <main class="main-content">
  <div class="page-header animate-in">
    <div class="page-header-left">
      <h1>Catalogo de Líneas</h1>
    </div>
    <div class="page-header-actions">
      <button class="btn btn-outline" onclick="alert('Exportar catálogo')">
        <i data-lucide="download"></i>
        <span class="btn-label">Exportar</span>
      </button>
      <button class="btn btn-primary" onclick="openModal()">
        <i data-lucide="plus"></i>
        <span class="btn-label">Nueva Línea</span>
      </button>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card stat-card-mint">
      <div class="stat-card-decoration"></div>
      <div class="stat-card-icon"><i data-lucide="package"></i></div>
      <div class="stat-card-label">Lineas registradas</div>
      <div class="stat-card-value">4</div>
    </div>
    <div class="stat-card stat-card-purple">
      <div class="stat-card-decoration"></div>
      <div class="stat-card-icon"><i data-lucide="check-circle"></i></div>
      <div class="stat-card-label">Lineas Activas</div>
      <div class="stat-card-value">4</div>
    </div>
    <div class="stat-card stat-card-coral">
      <div class="stat-card-decoration"></div>
      <div class="stat-card-icon"><i data-lucide="x-circle"></i></div>
      <div class="stat-card-label">Lineas Inactivas</div>
      <div class="stat-card-value">0</div>
    </div>
  </div>

  <div class="filter-bar">
        <div class="filter-field filter-search">
          <label class="filter-label">Buscar</label>
          <div class="filter-input-wrapper">
            <input
              type="text"
              class="filter-input"
              placeholder="Buscar linea..."
            />
            <i data-lucide="search" class="filter-icon"></i>
          </div>
        </div>

        <div class="filter-divider"></div>

        <div class="filter-field">
          <label class="filter-label">Estado</label>
          <select class="filter-select">
            <option>Todos</option>
            <option>Activo</option>
            <option>Inactivo</option>
            <option>Próximo a inactivar</option>
          </select>
        </div>

    <div class="filter-divider"></div>
    <div class="filter-field">
      <label class="filter-label">Líneas</label>
      <select class="filter-select" id="filterLine">
        <option value="">Todas las líneas</option>
        <option value="Tradicionales">Tradicionales</option>
        <option value="Light">Light</option>
        <option value="Nieves">Nieves</option>
        <option value="Fantasia">Fantasia</option>
      </select>
    </div>
    <div class="filter-divider"></div>
    <div class="filter-actions">
      <button class="filter-btn filter-btn--clear" onclick="clearFilters()">Limpiar</button>
      <button class="filter-btn filter-btn--primary">Buscar</button>
    </div>
  </div>

  <div class="table-card">
  <table class="data-table">
    <thead>
      <tr>
        <th>Linea</th>
        <th>Stock total</th>
        <th>Precio Detalle</th>
        <th>Precio Mayoritario</th>
      </tr>
    </thead>
    <tbody id="lineTableBody">
      <tr>
        <td>Tradicional</td>
        <td>75</td>
        <td>#</td>
        <td>#</td>
      </tr>
      <tr>
        <td>Light</td>
        <td>0</td>
        <td>#</td>
        <td>#</td>
      </tr>
      <tr>
        <td>Nieves</td>
        <td>0</td>
        <td>#</td>
        <td>#</td>
      </tr>
      <tr>
        <td>Fantasia</td>
        <td>0</td>
        <td>#</td>
        <td>#</td>
      </tr>
    </tbody>
  </table>
</div>

  </main>

<script>
  lucide.createIcons();

  function openModal() {
    const overlay = document.getElementById("modalNuevoaLinea");
    if(overlay) {
        overlay.classList.add("is-open");
        document.body.style.overflow = "hidden";    
    }
  }

  function clearFilters() {
    document.getElementById("searchInput").value = "";
    document.getElementById("filterLine").value = "";
  }
</script>
  </body>
