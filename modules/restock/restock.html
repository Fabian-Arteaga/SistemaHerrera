<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HerreraSystem - Nuevo Reabastecimiento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/shared/css/global.css" />
    <link rel="stylesheet" href="/shared/components/topbar/topbar.css" />
    <link rel="stylesheet" href="/shared/components/sidebar/sidebar.css" />
    <link rel="stylesheet" href="restock.css"/>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Contenedores para carga dinámica -->
    <div id="layout-placeholder"></div>
    <div id="topbar-placeholder"></div>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Nuevo Reabastecimiento</h1>
            <p class="page-subtitle">Gestión de entrada de nuevos lotes al inventario</p>
        </div>

        <form class="pedido-container">
            
            <!-- SECCIÓN 1: DATOS DE ENCABEZADO -->
            <div class="card card-pedido card-highlight">
                <h3 class="card-title">DATOS DE ENCABEZADO</h3>
                <div class="grid-form">
                    <div class="form-group">
                        <label>ID de Lote:</label>
                        <input type="text" value="LT-0001" readonly class="input-readonly">
                    </div>
                    <div class="form-group">
                        <label>Usuario:</label>
                        <input type="text" placeholder="Usuario actual" readonly class="input-readonly">
                    </div>
                    <div class="form-group">
                        <label>Fecha de ingreso:</label>
                        <input type="date" class="form-input">
                    </div>
                </div>
            </div>

            <!-- SECCIÓN 2: SELECCIONAR PRODUCTOS (Inspirado en Ventas) -->
            <div class="card card-pedido card-highlight">
                <h3 class="card-title">SELECCIONAR PRODUCTOS</h3>
                <div class="selector-grid">
                    <div class="form-group search-box">
                        <label>Buscar:</label>
                        <div class="input-icon">
                            <i data-lucide="search"></i>
                            <input type="text" placeholder="Buscar..." class="input-styled">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Línea:</label>
                        <select class="form-input">
                            <option>Tradicional</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Sabor:</label>
                        <select class="form-input">
                            <option>Mango</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Presentación:</label>
                        <select class="form-input">
                            <option>4 onza</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Cantidad:</label>
                        <input type="number" value="1" class="input-styled">
                    </div>
                </div>
                <!-- Botones de acción de selección -->
                <div class="button-group mt-3">
                    <button type="button" class="btn-action btn-clear">Limpiar</button>
                    <button type="button" class="btn-action btn-accept">Aceptar</button>
                </div>
            </div>

            <!-- SECCIÓN 3: DETALLES DE REABASTECIMIENTO -->
            <div class="card card-pedido card-highlight">
                <h3 class="card-title">DETALLES DE REABASTECIMIENTO</h3>
                <div class="selector-grid">

                    <div class="form-group">
                        <label>Cantidad a Ingresar</label>
                        <input type="number" placeholder="0" min="1" class="input-styled">
                    </div>

                    <div class="form-group">
                        <label>Costo Unitario (C$):</label>
                        <input type="number" step="0.01" placeholder="0.00" class="input-styled">
                    </div>
                    <div class="form-group">
                        <label>Vencimiento:</label>
                        <input type="date" class="input-styled">
                    </div>
                    <div class="form-group">
                        <label>Ubicación:</label>
                        <select class="form-input">
                            <option>Bodega Central</option>
                            <option>Congelador 1</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Estado Inicial de Lote:</label>
                        <select class="form-input">
                          <option value="disponible">Disponible</option>
                          <option value="cuarentena">En Cuarentena</option>
                             <option value="revision">En Revisión</option>
                        </select>
                    </div>



                </div>
            </div>

            <!-- SECCIÓN 4: TABLA DE PRODUCTOS -->
            <div class="card card-pedido table-section">
                <div class="table-wrapper">
                    <table class="pedido-table">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Cantidad</th>
                                <th>Costo Unit.</th>
                                <th>Vencimiento</th>
                                <th>Subtotal</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Sorbete tradicional fresa</td>
                                <td>10</td>
                                <td>120.00 C$</td>
                                <td>2026-12-01</td>
                                <td>1,200.00 C$</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- SECCIÓN 5: TOTALES Y CIERRE -->
            <div class="resumen-final-container">
                <div class="resumen-card">
                    <div class="resumen-row total-row">
                        <span>Inversión Total :</span>
                        <input type="text" readonly value="1,200.00 C$">
                    </div>
                    <button type="submit" class="btn-registrar-venta">Registrar Reabastecimiento</button>
                </div>
            </div>
        </form>

<script src="https://unpkg.com/lucide@latest"></script>
<script src="/shared/components/sidebar/sidebar.js"></script>
<script src="/shared/components/topbar/topbar.js"></script>
</body>
</html>
